name: Keep Render awake

# Pings the live site so Render's free tier doesn't spin the service down.
# Change SITE_URL below if your Render URL changes.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (GitHub may delay/coalesce runs)
  workflow_dispatch: {}       # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the site
        env:
          SITE_URL: "https://kaku-portfolio.onrender.com/"
        run: |
          echo "Pinging $SITE_URL"
          # Generous retries/timeout so a cold start (~30-60s) still succeeds.
          curl -fsS \
            --retry 5 --retry-all-errors --retry-delay 15 \
            --max-time 60 \
            "$SITE_URL" -o /dev/null
          echo "Site is awake."
