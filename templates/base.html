{% load static %}<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ seo.meta_title|default:site.site_title }}{% endblock %}</title>
    {% include "partials/_seo_meta.html" %}
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@200..800&display=swap"
      rel="stylesheet"
    />
    {% block extra_css %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% for a in announcements %}<div class="announcement">{{ a.message }}</div>{% endfor %}
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
  </body>
</html>
